    entity_id: input_datetime.coop_light_on_night
    internal: true
    id: kurnik_svetlo_on_night_time_sensor
    attribute: timestamp
    on_value:
      then:
        - lambda: |-
            auto call = id(kurnik_svetlo_on_night_time_sensor).state;
            int total_seconds = (int)call;
            int hour = (total_seconds / 3600) % 24;
            int minute = (total_seconds % 3600) / 60;
            id(chicken_light_on_time_hour_night) = hour;
            id(chicken_light_on_time_minutes_night) = minute;
