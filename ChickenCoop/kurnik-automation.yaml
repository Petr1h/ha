    update_interval: never
  - platform: template
    name: "Light On Minute Morning"
    id: light_on_minute_morning_display
    lambda: |-
      return id(chicken_light_on_time_minutes_morning);
    update_interval: never


    
# ------------------------------------------------------------------------------
# Automation
# ------------------------------------------------------------------------------

# Optional fallback: use RTC time if HA time is not available
interval:
  - interval: 10min
    then:
      - lambda: |-
          if (!id(ha_time).now().is_valid()) {
            ESP_LOGW("main", "Home Assistant time not valid, using RTC time.");
            auto rtc_now = id(rtc_time).now();
            ESP_LOGI("main", "RTC time: %04d-%02d-%02d %02d:%02d:%02d",
                     rtc_now.year, rtc_now.month, rtc_now.day_of_month,
                     rtc_now.hour, rtc_now.minute, rtc_now.second);
          }

# Chicken door control based on time
  - interval: 1min
    then:
      - script.execute: sync_chicken_door_automation

# Chicken Night light control based on time
      - script.execute: sync_chicken_light_automation

# Water valve control - open valve at set time for set duration
      - script.execute: sync_water_valve_automation

# Water heater control based on automation state and temperature
      - script.execute: sync_water_heater_automation