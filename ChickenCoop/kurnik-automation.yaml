# ------------------------------------------------------------------------------
# Automation
# ------------------------------------------------------------------------------

# Optional fallback: use RTC time if HA time is not available
interval:
  - interval: 10min
    then:
      - lambda: |-
          if (!id(ha_time).now().is_valid()) {
            ESP_LOGW("main", "Home Assistant time not valid, using RTC time.");
            auto rtc_now = id(rtc_time).now();
            ESP_LOGI("main", "RTC time: %04d-%02d-%02d %02d:%02d:%02d",
                     rtc_now.year, rtc_now.month, rtc_now.day_of_month,
                     rtc_now.hour, rtc_now.minute, rtc_now.second);
          }

# Chicken door control based on time
  - interval: 1min
    then:
      - lambda: |-
          auto now = id(rtc_time).now();
          if (now.hour == id(door_open_hours) && now.minute == id(door_open_minutes)) {
            auto call = id(chicken_door).make_call();
            call.set_command_open();
            call.perform();
            ESP_LOGI("main", "Opening chicken door at %02d:%02d", now.hour, now.minute);
          }
          if (now.hour == id(door_close_hours) && now.minute == id(door_close_minutes)) {
            auto call = id(chicken_door).make_call();
            call.set_command_close();
            call.perform();
            ESP_LOGI("main", "Closing chicken door at %02d:%02d", now.hour, now.minute);
          }
# Chicken Night light control based on time
      - lambda: |-
          auto now = id(rtc_time).now();
          if (now.hour == id(chicken_light_on_time_hour_night) && now.minute == id(chicken_light_on_time_minutes_night)) {
            id(chicken_light).turn_on().perform();
            ESP_LOGI("main", "Turning ON chicken light at %02d:%02d", now.hour, now.minute);
          }
          if (now.hour == id(chicken_light_off_time_hour_night) && now.minute == id(chicken_light_off_time_minutes_night)) {
            id(chicken_light).turn_off().perform();
            ESP_LOGI("main", "Turning OFF chicken light at %02d:%02d", now.hour, now.minute);
          }
# Chicken Morning light control based on time
      - lambda: |-
          auto now = id(rtc_time).now();
          if (now.hour == id(chicken_light_on_time_hour_morning) && now.minute == id(chicken_light_on_time_minutes_morning)) {
            id(chicken_light).turn_on().perform();
            ESP_LOGI("main", "Turning ON chicken light at %02d:%02d", now.hour, now.minute);
          }
          if (now.hour == id(chicken_light_off_time_hour_morning) && now.minute == id(chicken_light_off_time_minutes_morning)) {
            id(chicken_light).turn_off().perform();
            ESP_LOGI("main", "Turning OFF chicken light at %02d:%02d", now.hour, now.minute);
          }

# Water valve control - open every day at 7am for specified duration
      - lambda: |-
          auto now = id(rtc_time).now();
          if (now.hour == 7 && now.minute == 0) {
            ESP_LOGI("main", "Starting water fill for %d seconds", id(water_fill_time_seconds));
            id(water_valve_pin).turn_on();
            delay(id(water_fill_time_seconds) * 1000);
            id(water_valve_pin).turn_off();
            ESP_LOGI("main", "Water fill completed");
          }